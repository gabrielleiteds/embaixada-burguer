<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍔</text></svg>">
    <title> Embaixada Burger - Hambúrgueres Artesanais</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Righteous&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content" style="display: flex; align-items: center; flex-direction: column;">
            <img src="./images/logo-embaixada.png" alt="" style="width: 200px; margin-bottom: 20px;">
            <h1 class="logo">🍔</h1>
            <h1 class="logo">EMBAIXADA BURGUER</h1>
            <p class="tagline">Hambúrgueres da Igreja Embaixada da Fé</p>
            <a href="https://forms.gle/UaSHqLkvvy3dw7Pu6" class="cta-button" target="_blank">FAZER PEDIDO AGORA</a>
        </div>
        <div class="scroll-indicator">
            <svg viewBox="0 0 24 24">
                <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z" />
            </svg>
        </div>
    </section>


    <!-- Footer -->
    <footer class="footer">
        <p>🍔 EMBAIXADA BURGUER - Hambúrgueres Artesanais © 2025</p>
        <p>Faça seu pedido e saboreie a melhor experiência!</p>
    </footer>

    <script>
        // Animação suave ao scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });

        // Animação dos itens do menu ao aparecer na tela
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    setTimeout(() => {
                        entry.target.style.animation = `fadeInUp 0.6s ease-out forwards`;
                    }, index * 100);
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        document.querySelectorAll('.menu-item').forEach(item => {
            item.style.opacity = '0';
            observer.observe(item);
        });
    </script>
</body>

</html>
